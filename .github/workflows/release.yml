name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Verify tag matches version fields
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version=$(jq -r .version package.json)
          server_version=$(jq -r .version server.json)
          server_pkg_version=$(jq -r '.packages[0].version' server.json)

          echo "Tag version:               $tag_version"
          echo "package.json version:      $pkg_version"
          echo "server.json version:       $server_version"
          echo "server.json packages[0]:   $server_pkg_version"

          if [ "$tag_version" != "$pkg_version" ] \
            || [ "$tag_version" != "$server_version" ] \
            || [ "$tag_version" != "$server_pkg_version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match all three version fields. Bump package.json, server.json (top-level), and server.json packages[0] to the same value before tagging."
            exit 1
          fi

      - run: npm ci

      - name: Fail if version already published on npm
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view "playwright-report-mcp@${VERSION}" version 2>/dev/null || true)
          if [ -n "$PUBLISHED" ]; then
            echo "Error: playwright-report-mcp@${VERSION} is already published on npm."
            echo "Bump the version in package.json and both server.json entries, then cut a new release."
            exit 1
          fi
          echo "Version ${VERSION} is not yet published — proceeding."

      - run: npm run build

      - run: npm test

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag

      # TODO: migrate to npm Trusted Publishing (OIDC) — drop NODE_AUTH_TOKEN
      # once the trusted publisher is configured on npmjs.com against this repo
      # and workflow. See https://docs.npmjs.com/trusted-publishers
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
