name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        node-version: ['22', '24']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Run coverage
        run: npx vitest run --coverage
      - name: Report coverage on PR
        if: matrix.node-version == '22' && github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@3c50566c523e04813df28de8f7c48dd97d663f1c # v2.11.2
      - name: Upload coverage artifact
        if: matrix.node-version == '22'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Install fixture project dependencies
        run: npm ci --prefix test/fixtures/pw-project
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: pw-browsers-${{ hashFiles('test/fixtures/pw-project/package-lock.json') }}
          restore-keys: pw-browsers-
      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        working-directory: test/fixtures/pw-project
      # Fixture already installed above; invoke vitest directly to avoid a
      # redundant npm ci --prefix that `npm run test:e2e` would otherwise add.
      - name: Run e2e tests
        run: npx vitest run --config vitest.e2e.config.ts
